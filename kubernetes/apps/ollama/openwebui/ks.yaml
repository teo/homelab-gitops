---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app openwebui
  namespace: &namespace ollama
spec:
  dependsOn:
    - name: openwebui-config
      namespace: ollama
    - name: ollama
      namespace: ollama
    - name: litellm
      namespace: llm
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  path: ./kubernetes/apps/ollama/openwebui/app
  postBuild:
    substitute:
      APP: *app
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: homelab-gitops
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
