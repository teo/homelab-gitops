---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: litellm
spec:
  interval: 12h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.89.0
  url: oci://docker.litellm.ai/berriai/litellm-helm
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 10m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: litellm
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Pod
              name: litellm-test-servicemonitor
            patch: |
              apiVersion: v1
              kind: Pod
              metadata:
                name: litellm-test-servicemonitor
              $patch: delete
  values:
    replicaCount: 1
    fullnameOverride: litellm

    image:
      repository: ghcr.io/berriai/litellm-database
      pullPolicy: IfNotPresent
      tag: 1.89.0

    masterkeySecretName: litellm-master-key
    masterkeySecretKey: masterkey

    service:
      type: ClusterIP
      port: 4000

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi

    db:
      useExisting: true
      deployStandalone: false
      endpoint: litellm-db-rw.llm.svc.cluster.local
      database: litellm
      secret:
        name: litellm-postgres-secret
        usernameKey: username
        passwordKey: password

    postgresql:
      enabled: false

    redis:
      enabled: false

    migrationJob:
      enabled: true
      hooks:
        argocd:
          enabled: false
        helm:
          enabled: true
          weight: "1"
      resources:
        requests:
          cpu: 250m
          memory: 1Gi
        limits:
          cpu: "1"
          memory: 2Gi

    extraEnvVars:
      - name: VLLM_API_KEY
        valueFrom:
          secretKeyRef:
            name: vllm-api-key
            key: api-key

    proxy_config:
      model_list:
        - model_name: qwen36-nvfp4-local
          litellm_params:
            model: hosted_vllm/nvidia/Qwen3.6-35B-A3B-NVFP4
            api_base: http://vllm-router-service.llm.svc.cluster.local/v1
            api_key: os.environ/VLLM_API_KEY
      general_settings:
        master_key: os.environ/PROXY_MASTER_KEY
      litellm_settings:
        callbacks:
          - prometheus

    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
