---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: community-charts
  namespace: ml
  annotations:
    fluxcd.io/redeploy: "2026-02-09T21:50:00"
spec:
  interval: 12h
  url: https://community-charts.github.io/helm-charts
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mlflow
  namespace: ml
spec:
  interval: 3m

  chart:
    spec:
      chart: mlflow
      version: 1.8.1
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: ml
      interval: 12h

  # Private repo can provide cluster-specific config & secrets.
  valuesFrom:
    - kind: ConfigMap
      name: mlflow-values
      optional: false

  values:
    strategy:
      type: Recreate

    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 4Gi

    # Use local PVC-backed artifacts for now (no S3/GCS/Azure yet).
    extraVolumes:
      - name: mlflow-data
        persistentVolumeClaim:
          claimName: mlflow-data-pvc
    extraVolumeMounts:
      - name: mlflow-data
        mountPath: /mlflow/data

    backendStore:
      databaseMigration: true
      databaseConnectionCheck: true
      postgres:
        enabled: true

    artifactRoot:
      proxiedArtifactStorage: true
      defaultArtifactRoot: /mlflow/data/mlruns
      defaultArtifactsDestination: /mlflow/data/mlartifacts

    service:
      name: mlflow
